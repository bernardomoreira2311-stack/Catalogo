<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Inteligente de Produtos</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>


    <header>
        <nav>
            <img src="d6271353-22dd-404d-a532-1cf744bbd7ef.png" alt="Logotipo Catálogo de Produtos" width="300">
        </nav>
    </header>

    
    <main>

        
        <section>
            <h1>Catálogo de Produtos</h1>

            
            <figure>
                <img src="iphone17.png" alt="Produto selecionado" id="imagem">
                <figcaption>Imagem do produto</figcaption>
            </figure>

            
            <form>
                <label for="pdtInteli">Escolha um Produto:</label>
                <select name="pdtInteligente" id="pdtInteli">
                    <option value="iph17">Iphone 17 Pro Max</option>
                    <option value="airp4">AirPods 4</option>
                    <option value="afeLux">AirFryer Electrolux</option>
                    <option value="GelElx">Geladeira Electrolux</option>
                    <option value="chutcNike">Chuteira Nike Mercurial</option>
                </select>

                <input type="button" value="Mostrar Produto" onclick="mostrarProduto()">
            </form>

            
            <article>
                   <h2>Descrição do Produto</h2>
            </article>

        </section>

    </main>

    
    <footer>
        <p>&copy; 2026 Catálogo de Produtos</p>
    </footer>

    <script src="main.js"></script>

</body>
</html>
